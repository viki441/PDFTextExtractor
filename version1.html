<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PDF Text Extractor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>

<body>
    <h2>PDF Text Extractor</h2> <label for="myfile">Select a PDF file:</label> <input type="file" id="myfile"
        accept="application/pdf"> <button id="generateBtn">Generate</button><br><br> <textarea id="text" rows="25"
        cols="100" placeholder="Extracted text will appear here..."></textarea>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        async function generate() {
            const fileInput = document.getElementById('myfile');
            if (!fileInput.files.length)
                return alert("Please select a PDF file");


            const arrayBuffer = await fileInput.files[0].arrayBuffer();
            const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
            const pdf = await loadingTask.promise;
            let allText = '';

            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                const content = await page.getTextContent(); console.log(content.items.map(i => i.str));
                let pageText = content.items.map(i => i.str).join("").normalize('NFC');
                const latinDiacriticRegex = /[\u0100-\u017F]/; const macronRegex = /[膧膩膾膿莫墨艑艒弄奴]|[A-Za-z]\u0304/;
                const cyrillicRegex = /[\u0400-\u04FF]/;
                const garbledToCyrillic = { '脌': '袗', '脕': '袘', '脗': '袙', '脙': '袚', '脛': '袛', '脜': '袝', '脝': '袞', '脟': '袟', '脠': '袠', '脡': '袡', '脢': '袣', '脣': '袥', '脤': '袦', '脥': '袧', '脦': '袨', '脧': '袩', '脨': '袪', '脩': '小', '脪': '孝', '脫': '校', '脭': '肖', '脮': '啸', '脰': '笑', '脳': '效', '脴': '楔', '脵': '些', '脷': '歇', '脹': '蝎', '脺': '鞋', '脻': '协', '脼': '挟', '脽': '携', '脿': '邪', '谩': '斜', '芒': '胁', '茫': '谐', '盲': '写', '氓': '械', '忙': '卸', '莽': '蟹', '猫': '懈', '茅': '泄', '锚': '泻', '毛': '谢', '矛': '屑', '铆': '薪', '卯': '芯', '茂': '锌', '冒': '褉', '帽': '褋', '貌': '褌', '贸': '褍', '么': '褎', '玫': '褏', '枚': '褑', '梅': '褔', '酶': '褕', '霉': '褖', '煤': '褗', '没': '褘', '眉': '褜', '媒': '褝', '镁': '褞', '每': '褟' }; 
                const fixCyrillic = t => t.split('').map(c => garbledToCyrillic[c] || c).join(''); 
                const lines = pageText.split(/\r?\n/).map(l => fixCyrillic(l));
                allText += `=== Page ${pageNum} ===\n`;

                lines.forEach(l => {
                    if (latinDiacriticRegex.test(l) || cyrillicRegex.test(l)) { allText += l + '\n'; }
                    if (macronRegex.test(l)) {
                        const debugLine = l.replace(/\u0304/g, '虅');
                        allText += '=== Line with macron: ' + debugLine + '\n';
                    }
                });
                allText += '\n';
            }
            allText = allText.replace(/袟邪写\./g, '\n\n袟邪写.');
            allText = allText.replace(/^\n/, ''); document.getElementById('text').value = allText;
        }
        document.getElementById('generateBtn').addEventListener('click', generate); 
    </script>
</body>
</html>
